<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View detailed information about movies and TV shows on Velora." />
  <title>Details — Velora</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
</head>
<body data-page="details" class="page-enter details-page">

  <!-- Topbar (minimal for details) -->
  <header class="topbar topbar--details" id="topbar">
    <a href="index.html" class="details-back-btn" id="detailsBackBtn" title="Back to Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      <span>Back to Home</span>
    </a>
    <div class="topbar__search">
      <div class="search-container">
        <div class="search-bar">
          <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input class="search-bar__input" type="text" placeholder="Search movies & shows…" />
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
  </header>

  <!-- Backdrop -->
  <div class="details-backdrop" id="detailsBackdrop">
    <div class="skeleton" style="width:100%;height:100%;"></div>
  </div>

  <!-- Details Content -->
  <div class="details-content" id="detailsContent">
    <div class="loading-spinner"></div>
  </div>

  <!-- Similar Titles -->
  <main class="main-content" id="detailsMain" style="padding-top:20px;"></main>

  <!-- Footer -->
  <footer class="footer">

  </footer>

  <script src="auth.js"></script>
  <script src="shield.js"></script>
  <script src="app.js"></script>
  <script src="cleaner.js"></script>
</body>
</html>
