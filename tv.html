<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse all TV shows by genre on Velora." />
  <title>TV Shows — Velora</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
</head>
<body data-page="tv" class="page-enter">

  <!-- ═══════ Sidebar ═══════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__header">
      <a href="index.html" class="sidebar__brand">
        <svg viewBox="0 0 32 32" fill="currentColor"><path d="M4 4h24v24H4V4zm3 3v18h18V7H7zm4 4l10 5-10 5V11z"/></svg>
        <span>Velora</span>
      </a>
      <button class="sidebar__close" id="sidebarClose" aria-label="Close menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <nav class="sidebar__nav">
      <div class="sidebar__section-label">MENU</div>
      <a href="index.html" class="sidebar__link" data-page="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </a>
      <a href="movies.html" class="sidebar__link" data-page="movies">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>
        <span>Movies</span>
      </a>
      <a href="tv.html" class="sidebar__link active" data-page="tv">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
        <span>TV Shows</span>
      </a>
      <div class="sidebar__divider"></div>
      <div class="sidebar__section-label">CATEGORIES</div>
      <div class="sidebar__genres" id="sidebarGenres"></div>
    </nav>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-wrapper" id="appWrapper">
    <header class="topbar" id="topbar">
      <button class="topbar__hamburger" id="sidebarToggle" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar__page-title">📺 TV Shows</div>
      <div class="topbar__search">
        <div class="search-container">
          <div class="search-bar">
            <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input class="search-bar__input" type="text" placeholder="Search movies & shows…" />
          </div>
          <div class="search-results" id="searchResults"></div>
        </div>
      </div>
    </header>

    <main class="main-content" id="mainContent"></main>

    <footer class="footer">

    </footer>
  </div>

  <script src="auth.js"></script>
  <script src="shield.js"></script>
  <script src="app.js"></script>
  <script src="cleaner.js"></script>
</body>
</html>
